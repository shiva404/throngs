<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Throngs — Street Simulation</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
    }
  }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #4a8fe2; --green: #27ae60; --red: #e74c3c;
      --yellow: #f5a623; --panel: rgba(255,255,255,0.94);
      --border: rgba(74,143,226,0.22); --text: #2c3e50; --muted: #7f8c8d;
    }
    html, body { height: 100%; overflow: hidden;
      font-family: "Segoe UI", system-ui, sans-serif; background: #e8f0f7; }
    body { display: flex; flex-direction: column; }

    #hdr {
      display: flex; align-items: center; gap: .7rem;
      padding: .38rem 1rem; background: var(--panel);
      border-bottom: 1px solid var(--border); z-index: 10;
      flex-shrink: 0; backdrop-filter: blur(10px);
    }
    #hdr h1 { font-size: .88rem; font-weight: 700; color: var(--accent); letter-spacing: .04em; }
    #hdr nav a {
      font-size: .72rem; color: var(--muted); text-decoration: none;
      padding: .18rem .5rem; border-radius: 5px; transition: background .15s;
    }
    #hdr nav a:hover, #hdr nav a.on { background: var(--accent); color: #fff; }
    .sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: blink 2s infinite; flex-shrink: 0; }
    .sdot.live { background: var(--green); }
    .sdot.demo { background: var(--yellow); }
    .sdot.off  { background: var(--red); animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
    #stxt { font-size: .72rem; color: var(--muted); }
    #ecnt { font-size: .68rem; color: var(--muted); }
    #simclock { font-size: .76rem; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
    #btn-startday {
      padding: .22rem .6rem; border: none; border-radius: 6px;
      font-size: .68rem; font-weight: 700; cursor: pointer;
      background: var(--green); color: #fff; transition: background .15s;
    }
    #btn-startday:hover { background: #219a52; }
    #btn-startday.paused { background: var(--yellow); }
    #btn-refresh-config {
      padding: .22rem .5rem; border: 1px solid var(--border); border-radius: 6px;
      font-size: .68rem; font-weight: 600; cursor: pointer;
      background: transparent; color: var(--text); transition: background .15s, border-color .15s;
    }
    #btn-refresh-config:hover { background: rgba(74,143,226,.12); border-color: var(--accent); }
    #btn-refresh-config:disabled { opacity: .6; cursor: not-allowed; }
    .hdr-right { margin-left: auto; display: flex; align-items: center; gap: .5rem; }

    #main { flex: 1; display: flex; overflow: hidden; position: relative; }
    #cvw  { flex: 1; position: relative; overflow: hidden; }
    canvas { display: block; width: 100% !important; height: 100% !important; }

    #sb {
      width: 282px; background: rgba(232,240,247,.97);
      border-left: 1px solid var(--border); overflow-y: auto;
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sbh { padding: .5rem .75rem .18rem; font-size: .6rem; text-transform: uppercase;
      letter-spacing: .09em; color: var(--muted); border-bottom: 1px solid var(--border); }
    .sbh.clickable { cursor: pointer; user-select: none; }
    .sbh.clickable:hover { color: var(--accent); }
    .sbi { padding: .45rem .55rem; display: flex; flex-direction: column; gap: .35rem; }

    .pc {
      background: var(--panel); border: 1px solid var(--border); border-radius: 9px;
      padding: .48rem .6rem; cursor: pointer; transition: border-color .15s, transform .1s;
    }
    .pc:hover { border-color: var(--accent); transform: translateX(2px); }
    .pc.on { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(74,143,226,.18); }
    .pch  { display: flex; align-items: center; gap: .4rem; margin-bottom: .2rem; }
    .pcdot{ width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .pcn  { font-size: .76rem; font-weight: 700; }
    .pcdesc { font-size: .62rem; color: var(--muted); line-height: 1.35; margin-bottom: .22rem;
              display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .pcth { font-size: .67rem; color: #466; font-style: italic;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: .22rem; }
    .fbr { height: 5px; background: rgba(0,0,0,.08); border-radius: 3px; overflow: hidden; }
    .fbf { height: 100%; border-radius: 3px; transition: width .4s, background .4s; background: var(--green); }
    .pcmeta { display: flex; gap: .45rem; margin-top: .25rem; font-size: .6rem; color: var(--muted); flex-wrap: wrap; align-items: center; }
    .tag { padding: .08rem .3rem; border-radius: 4px; font-size: .58rem; font-weight: 600; }
    .t-own { background: rgba(74,143,226,.12); color: var(--accent); }
    .t-acc { background: rgba(39,174,96,.12);  color: var(--green); }
    .t-sta { background: rgba(245,166,35,.12); color: #c47d00; }
    .t-stf { background: rgba(155,89,182,.12); color: #9b59b6; }
    .t-qb  { background: rgba(39,174,96,.28);  color: #1a7a3f; }

    .shc {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 9px; padding: .48rem .6rem;
    }
    .shch { display: flex; align-items: center; gap: .38rem; margin-bottom: .28rem; }
    .shci { width: 24px; height: 24px; border-radius: 5px; display: flex;
            align-items: center; justify-content: center; font-size: .8rem; flex-shrink: 0; }
    .shcn { font-size: .72rem; font-weight: 700; }
    .mets { display: flex; gap: .3rem; flex-wrap: wrap; }
    .m { min-width: 48px; }
    .mv { font-size: .82rem; font-weight: 700; }
    .ml { font-size: .55rem; text-transform: uppercase; color: var(--muted); }

    #tk {
      height: 26px; background: #131c2a; color: #9eb8d4;
      font-size: .69rem; display: flex; align-items: center; flex-shrink: 0; overflow: hidden;
    }
    #tkl { padding: 0 .6rem; font-weight: 700; font-size: .6rem; letter-spacing: .08em;
      color: var(--accent); text-transform: uppercase; background: #0d1520;
      height: 100%; display: flex; align-items: center; white-space: nowrap; flex-shrink: 0; }
    #tks { flex: 1; overflow: hidden; white-space: nowrap; }
    #tki { display: inline-flex; gap: 2rem; animation: scroll 50s linear infinite; }
    @keyframes scroll { 0%{transform:translateX(110%)} 100%{transform:translateX(-100%)} }
    .ti { display: inline-flex; align-items: center; gap: .3rem; }
    .ts { color: #2ecc71; } .te { color: #e74c3c; } .tv { color: #f5a623; }

    #pop {
      position: absolute; background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: .8rem .95rem; min-width: 210px; max-width: 285px;
      box-shadow: 0 8px 26px rgba(0,0,0,.12); pointer-events: none;
      z-index: 30; transition: opacity .18s; font-size: .76rem; line-height: 1.55;
    }
    #pop.h { opacity: 0; }
    #pop h3 { font-size: .86rem; color: var(--accent); margin-bottom: .3rem; }

    #hint { position: absolute; bottom: .55rem; left: .55rem;
      font-size: .6rem; color: rgba(44,62,80,.32); pointer-events: none; }

    #sb::-webkit-scrollbar { width: 3px; }
    #sb::-webkit-scrollbar-thumb { background: rgba(74,143,226,.18); border-radius: 2px; }

    .launch-panel {
      background: linear-gradient(135deg, rgba(74,143,226,.06), rgba(39,174,96,.06));
      border-bottom: 1px solid var(--border);
      padding: .55rem .6rem .6rem;
    }
    .launch-panel .sbh { border-bottom: none; padding: 0 0 .3rem 0; }
    .lp-row { display: flex; flex-direction: column; gap: .12rem; margin-bottom: .35rem; }
    .lp-row label { font-size: .58rem; text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); font-weight: 600; }
    .lp-row select, .lp-row input[type="text"], .lp-row input[type="number"], .lp-row textarea {
      font-size: .72rem; padding: .3rem .4rem; border: 1px solid var(--border);
      border-radius: 6px; background: #fff; color: var(--text);
      font-family: inherit; outline: none; transition: border-color .15s;
    }
    .lp-row select:focus, .lp-row input:focus, .lp-row textarea:focus { border-color: var(--accent); }
    .lp-row textarea { resize: vertical; min-height: 2rem; max-height: 4rem; }
    .lp-row-hz { display: flex; gap: .35rem; }
    .lp-row-hz .lp-row { flex: 1; margin-bottom: 0; }
    .lp-check { display: flex; align-items: center; gap: .35rem; margin-bottom: .35rem; }
    .lp-check input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--accent); }
    .lp-check label { font-size: .64rem; color: var(--muted); font-weight: 600; }
    #btn-launch {
      width: 100%; padding: .42rem; border: none; border-radius: 7px;
      font-size: .74rem; font-weight: 700; cursor: pointer;
      background: var(--accent); color: #fff; letter-spacing: .03em;
      transition: background .15s, transform .1s;
    }
    #btn-launch:hover { background: #3a7cd0; transform: translateY(-1px); }
    #btn-launch:disabled { opacity: .55; cursor: not-allowed; }
    #btn-swarm {
      width: 100%; padding: .42rem; border: none; border-radius: 7px;
      font-size: .74rem; font-weight: 700; cursor: pointer;
      background: var(--green); color: #fff; letter-spacing: .03em;
      transition: background .15s, transform .1s; margin-top: .3rem;
    }
    #btn-swarm:hover { background: #219a52; transform: translateY(-1px); }
    #btn-swarm:disabled { opacity: .55; cursor: not-allowed; }
    .lp-btns { display: flex; gap: .35rem; }
    .lp-btns button { flex: 1; }
    .runs-list { display: flex; flex-direction: column; gap: .3rem; margin-top: .35rem; }
    .run-status { padding: .35rem .45rem; background: var(--panel); border: 1px solid var(--border);
      border-radius: 7px; font-size: .65rem; display: flex; align-items: center; gap: .4rem; }
    .run-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green);
      animation: blink 1.4s infinite; flex-shrink: 0; }
    .run-dot.done { background: var(--muted); animation: none; }
    .run-info { flex: 1; }
    .run-elapsed { color: var(--muted); }

    /* Activity log */
    /* Activity Log — dedicated section (visible below main, above ticker) */
    #activity-section {
      flex-shrink: 0;
      background: var(--panel);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #activity-section .activity-header {
      padding: .4rem .75rem;
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--accent);
      background: rgba(74,143,226,.08);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    #activity-section .activity-header:hover { background: rgba(74,143,226,.12); }
    #activity-log {
      height: 200px;
      max-height: 200px;
      overflow-y: auto;
      padding: .5rem .75rem;
      transition: max-height .25s ease, padding .25s ease;
    }
    #activity-log.collapsed { max-height: 0 !important; padding: .35rem .75rem !important; overflow: hidden !important; min-height: 0 !important; }
    .log-entry { font-size: .62rem; line-height: 1.5; padding: .2rem 0; border-bottom: 1px solid rgba(0,0,0,.05); }
    .log-time { color: var(--muted); font-variant-numeric: tabular-nums; margin-right: .35rem; }
    .log-who { font-weight: 600; }
  </style>
</head>
<body>

<div id="hdr">
  <h1>Throngs</h1>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/street" class="on">Street Sim</a>
  </nav>
  <span id="simclock">Day 1 — 8:00 AM</span>
  <button id="btn-startday">▶ Start Day</button>
  <button id="btn-refresh-config" title="Refetch street config and rebuild places (credentials, street_config)">↻ Refresh config</button>
  <div class="hdr-right">
    <div class="sdot" id="sdot"></div>
    <span id="stxt">Connecting…</span>
    <span id="ecnt">0 events</span>
  </div>
</div>

<div id="main">
  <div id="cvw">
    <canvas id="cv"></canvas>
    <div id="hint">Drag to orbit · Scroll to zoom · Click shops & toggles</div>
    <div id="pop" class="h">
      <h3 id="popt">—</h3>
      <div id="popb">—</div>
    </div>
  </div>
  <div id="sb">
    <div class="launch-panel">
      <div class="sbh">Launch Simulation</div>
      <div class="lp-row">
        <label>Persona <span style="font-weight:400;text-transform:none">(for single run)</span></label>
        <select id="lp-persona"><option value="">Loading…</option></select>
      </div>
      <div class="lp-row">
        <label>Target URL</label>
        <input type="text" id="lp-url" value="https://qbo.intuit.com" />
      </div>
      <div class="lp-row-hz">
        <div class="lp-row">
          <label>Company</label>
          <select id="lp-company"><option value="">Default</option></select>
        </div>
        <div class="lp-row">
          <label>Max Steps</label>
          <input type="number" id="lp-steps" value="50" min="5" max="200" style="width:100%" />
        </div>
      </div>
      <div class="lp-row-hz">
        <div class="lp-row">
          <label>Max Concurrent</label>
          <input type="number" id="lp-concurrent" value="2" min="1" max="10" style="width:100%" />
        </div>
        <div class="lp-row" style="justify-content:flex-end">
          <div class="lp-check" style="margin-bottom:0;margin-top:.35rem">
            <input type="checkbox" id="lp-verbose" />
            <label for="lp-verbose">Verbose</label>
          </div>
        </div>
      </div>
      <div class="lp-row">
        <label>Goal <span style="font-weight:400;text-transform:none">(leave blank for auto)</span></label>
        <textarea id="lp-goal" placeholder="Auto-synthesized from persona's inner voice"></textarea>
      </div>
      <div class="lp-row">
        <label>Relations file <span style="font-weight:400;text-transform:none">(optional)</span></label>
        <input type="text" id="lp-relations" placeholder="Path to throng graph JSON/YAML" />
      </div>
      <div class="lp-btns">
        <button id="btn-launch">Start Single</button>
        <button id="btn-swarm">Launch All</button>
      </div>
      <div class="runs-list" id="runs-list"></div>
    </div>
    <div class="sbh">Businesses</div>
    <div class="sbi" id="pclist-biz"></div>
    <div class="sbh" style="margin-top:.2rem">Offices</div>
    <div class="sbi" id="pclist-office"></div>
    <div class="sbh" style="margin-top:.2rem">Financials</div>
    <div class="sbi" id="shlist"></div>
  </div>
</div>

<section id="activity-section" aria-label="Activity Log">
  <div class="activity-header" id="log-toggle" title="Click to expand or collapse">📋 Activity Log ▾</div>
  <div id="activity-log"></div>
</section>

<div id="tk">
  <div id="tkl">Live Feed</div>
  <div id="tks"><div id="tki"><span class="ti">Waiting for Start Day…</span></div></div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Data config (set from GET /street-config; fallback if fetch fails) ───────

let PERSONA_CFG = {};
let SHOPS = [];
let ROOMS = [];
let ALL_PLACES = [];
let PCOLORS = [0x4a8fe2,0xe2b04a,0xe24a4a,0xe24aad,0x4ab08a,0x9b59b6];
let PHEX    = ['#4a8fe2','#e2b04a','#e24a4a','#e24aad','#4ab08a','#9b59b6'];

function applyStreetConfigFallback() {
  // Only used when /street-config fetch fails; real config comes from persona folder via server.
  PERSONA_CFG = {};
  SHOPS = [
    { id:'shop',   name:'Shop',   emoji:'🏪', color:0xf39c12, hex:'#f39c12', floor:0xfff8ee, pos:[-6,0,-6] },
    { id:'office', name:'Office', emoji:'🏢', color:0x3f88e2, hex:'#3f88e2', floor:0xe8eeff, pos:[ 6,0,-6] },
  ];
  ROOMS = [];
  ALL_PLACES = [...SHOPS, ...ROOMS];
  PCOLORS = [0x4a8fe2,0xe2b04a,0xe24a4a,0xe24aad,0x4ab08a,0x9b59b6];
  PHEX    = ['#4a8fe2','#e2b04a','#e24a4a','#e24aad','#4ab08a','#9b59b6'];
}

// ─── Global state ─────────────────────────────────────────────────────────────

const personas   = new Map();
const shopMeshes = new Map();
const roomMeshes = new Map();
const placeFin   = new Map();
const placeActive = new Map();
const placeBankBalance = new Map(); // place_id -> balance (from SQLite)
const particles  = [];
const customerNPCs = [];
const relationArcs = [];

let colorCursor  = 0;
let eventCount   = 0;
let receivedAgentEvent = false;
let loadedPersonas = [];
let credentialsMap = {};
let relationsData = null;

// Phone / email interrupt indicators per place (timestamp when interrupt happened)
const placeIndicators = {};  // placeId -> { phone?: number, email?: number }
const placeIndicatorMeshes = new Map();  // placeId -> { phone, email } (THREE meshes)

// Timer state
let simRunning = false;
let simDayNum = 1;
let simMinuteOfDay = 480; // 8:00 AM
const SIM_START_MINUTE = 480;
const SIM_END_MINUTE = 1080;
// sim minutes per real second; set from sim_time_scale_factor (real sec per sim min) when config loads
let SIM_SPEED = 2;
let lastAnimTime = 0;
let nextCustomerSpawn = 60 * 2;   // first customer after ~2 min, then regular interval

function initPlaceMaps() {
  ALL_PLACES.forEach(s => {
    placeFin.set(s.id, { sales:0, expenses:0, inventory:0, txCount:0 });
    placeActive.set(s.id, false);
  });
}

/** Remove all shop/room groups from the scene and clear place mesh maps (for full place rebuild). */
function removePlaceMeshes() {
  for (const [, data] of shopMeshes) {
    if (data.group && data.group.parent) data.group.parent.remove(data.group);
  }
  for (const [, data] of roomMeshes) {
    if (data.group && data.group.parent) data.group.parent.remove(data.group);
  }
  shopMeshes.clear();
  roomMeshes.clear();
}

function getPlaceMeshes(id) { return shopMeshes.get(id) || roomMeshes.get(id); }

const INDICATOR_DURATION_MS = 12000;

function ensurePlaceIndicatorMeshes(placeId) {
  if (placeIndicatorMeshes.has(placeId)) return placeIndicatorMeshes.get(placeId);
  const sm = getPlaceMeshes(placeId);
  if (!sm || !sm.group) return null;
  const phoneTex = signTex('📞', '#1a8a4a', '#fff', 80, 80, 36);
  const emailTex = signTex('📧', '#3498db', '#fff', 80, 80, 36);
  const phoneMat = new THREE.MeshBasicMaterial({ map: phoneTex, transparent: true, depthTest: false });
  const emailMat = new THREE.MeshBasicMaterial({ map: emailTex, transparent: true, depthTest: false });
  const phone = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 1.2), phoneMat);
  const email = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 1.2), emailMat);
  phone.position.set(-0.7, 5.8, 0);
  email.position.set(0.7, 5.8, 0);
  phone.visible = false;
  email.visible = false;
  sm.group.add(phone);
  sm.group.add(email);
  const entry = { phone, email };
  placeIndicatorMeshes.set(placeId, entry);
  return entry;
}

function tickPlaceIndicators(t) {
  const now = Date.now();
  for (const placeId of Object.keys(placeIndicators)) {
    const ind = placeIndicators[placeId];
    const meshes = placeIndicatorMeshes.get(placeId);
    if (!meshes) continue;
    if (ind.phone != null) {
      const age = now - ind.phone;
      meshes.phone.visible = age < INDICATOR_DURATION_MS;
      if (meshes.phone.visible) {
        const ring = 1 + 0.12 * Math.sin(t * 18);
        meshes.phone.scale.setScalar(ring);
        meshes.phone.rotation.z = Math.sin(t * 12) * 0.08;
      }
    }
    if (ind.email != null) {
      const age = now - ind.email;
      meshes.email.visible = age < INDICATOR_DURATION_MS;
      if (meshes.email.visible) {
        const pulse = 1 + 0.06 * Math.sin(t * 8);
        meshes.email.scale.setScalar(pulse);
      }
    }
  }
}
function findPlace(id) { return ALL_PLACES.find(p => p.id === id); }

function formatSimTime() {
  let h = Math.floor(simMinuteOfDay / 60);
  const m = Math.floor(simMinuteOfDay % 60);
  const ampm = h >= 12 ? 'PM' : 'AM';
  if (h > 12) h -= 12;
  if (h === 0) h = 12;
  return `Day ${simDayNum} — ${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

function getPlaceCompany(placeId) {
  for (const [company, personaNames] of Object.entries(credentialsMap)) {
    for (const pName of personaNames) {
      if (PERSONA_CFG[pName]?.place === placeId) return company;
    }
  }
  return '';
}

// ─── Renderer / scene ─────────────────────────────────────────────────────────

const cv   = document.getElementById('cv');
const wrap = document.getElementById('cvw');

const renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.12;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0xd8eaf5);
scene.fog = new THREE.FogExp2(0xd8eaf5, 0.016);

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 300);
camera.position.set(0, 36, 20);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.maxPolarAngle = Math.PI / 2.08;
controls.minDistance = 6;
controls.maxDistance = 80;
controls.update();

// ─── Canvas texture helpers ───────────────────────────────────────────────────

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w,y, x+w,y+r, r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h, x+w-r,y+h, r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h, x,y+h-r, r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y, x+r,y, r); ctx.closePath();
}

function makeTex(fn, w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  fn(c.getContext('2d'), w, h);
  return new THREE.CanvasTexture(c);
}

function signTex(text, bg, fg='#fff', w=512, h=80, fs=22) {
  return makeTex((ctx, W, H) => {
    // Background with darkened overlay for contrast
    ctx.fillStyle = bg; rr(ctx,2,2,W-4,H-4,14); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; rr(ctx,2,2,W-4,H-4,14); ctx.fill();
    // Text with shadow for legibility
    ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 6;
    ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 1;
    ctx.fillStyle = fg; ctx.font = `bold ${fs}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(text, W/2, H/2);
  }, w, h);
}

function speechTex(text='') {
  return makeTex((ctx, W, H) => {
    ctx.shadowColor = 'rgba(0,0,0,0.15)'; ctx.shadowBlur = 7;
    ctx.fillStyle = '#fff'; rr(ctx,4,4,W-8,H-22,12); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.moveTo(W/2-9,H-22); ctx.lineTo(W/2,H-4); ctx.lineTo(W/2+9,H-22); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(74,143,226,0.3)'; ctx.lineWidth=1.5;
    rr(ctx,4,4,W-8,H-22,12); ctx.stroke();
    ctx.fillStyle = '#2c3e50'; ctx.font = '13px Arial'; ctx.textAlign = 'center';
    const words = text.split(' ');
    let line='', y=22, lines=[];
    for (const w of words) {
      const t = line ? line+' '+w : w;
      if (ctx.measureText(t).width > W-22 && line) { lines.push(line); line=w; }
      else line = t;
    }
    if (line) lines.push(line);
    lines.slice(0,3).forEach((l,i) => ctx.fillText(l, W/2, y+i*17));
  }, 300, 88);
}

function buildCustomer() {
  const g = new THREE.Group();
  const grey = new THREE.MeshLambertMaterial({ color: 0x9e9e9e });
  const body = new THREE.Mesh(new THREE.SphereGeometry(.3,10,10), grey);

  head.position.y = .78; head.castShadow = true; g.add(head);

function spawnCustomer() {
  const activeShops = SHOPS.filter(s => placeActive.get(s.id));
  if (activeShops.length === 0) return;
  const shop = activeShops[Math.floor(Math.random() * activeShops.length)];
  const mesh = buildCustomer();
  const fromLeft = Math.random() > 0.5;
  const startX = fromLeft ? -22 : 22;
  mesh.position.set(startX, 0, (Math.random() - 0.5) * 2);
  scene.add(mesh);
  const [sx,,sz] = shop.pos;
  const entryZ = sz + (sz > 0 ? -2.2 : 2.2);
  customerNPCs.push({
    mesh, shopId: shop.id, state: 'walking_to',
    targetX: sx + (Math.random() - 0.5), targetZ: entryZ,
    exitX: fromLeft ? 22 : -22,
    timer: 0, phase: Math.random() * Math.PI * 2,
  });
}

/** Fulfill one customer waiting at placeId (called when agent completes a sale for that place). */
function fulfillOneCustomerAt(placeId) {
  const c = customerNPCs.find(c => c.shopId === placeId && c.state === 'visiting');
  if (!c) return;
  const saleAmt = Math.floor(Math.random() * 480 + 60);
  const fin = placeFin.get(placeId);
  if (fin) { fin.sales += saleAmt; fin.txCount++; refreshPlaceCard(placeId); }
  spawnTxVisual(placeId, 'sale');
  const shop = findPlace(placeId);
  addTick(placeId, 'sale', 'Customer');
  addLogEntry('👤', 'Customer', `Order fulfilled → ${shop?.name} ($${saleAmt})`, '#9e9e9e');
  // Reflect sale to persisted bank (SQLite); balance increases for this account
  fetch('/street/record-sale', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      place_id: placeId,
      amount: saleAmt,
      account_name: shop?.name || placeId,
    }),
  }).then(r => r.json()).then(data => {
    if (data.balance != null) {
      placeBankBalance.set(placeId, data.balance);
      refreshPlaceCard(placeId);
    }
  }).catch(() => {});
  c.state = 'walking_away';
  c.targetX = c.exitX;
  c.targetZ = (Math.random() - 0.5) * 2;
}

function tickCustomers(dt) {
  if (!simRunning) return;
  // Only spawn customers when throngs are actually running (no artificial activity)
  if (activeRuns.size > 0) {
    const waitingOrVisiting = customerNPCs.filter(c => c.state === 'walking_to' || c.state === 'visiting').length;
    nextCustomerSpawn -= dt;
    if (nextCustomerSpawn <= 0 && waitingOrVisiting < 2) {
      spawnCustomer();
      nextCustomerSpawn = 60 * (2 + Math.random() * 3);   // 2–5 min to next spawn (regular flow, max 2 at once)
    }
  }
  for (let i = customerNPCs.length - 1; i >= 0; i--) {
    const c = customerNPCs[i];
    const speed = 0.06;
    if (c.state === 'walking_to') {
      const dx = c.targetX - c.mesh.position.x;
      const dz = c.targetZ - c.mesh.position.z;
      const dist = Math.sqrt(dx*dx + dz*dz);
      if (dist < 0.4) {
        c.state = 'visiting'; // wait until fulfillOneCustomerAt(placeId) is called by a real sale event
        refreshPlaceCard(c.shopId); // update "Waiting" count so throng knows to serve first
      } else {
        c.mesh.position.x += (dx/dist) * speed;
        c.mesh.position.z += (dz/dist) * speed;
        c.mesh.rotation.y = Math.atan2(dx, dz);
      }
    } else if (c.state === 'visiting') {
      // Customer waits until agent completes a sale for this shop (see applySSE → fulfillOneCustomerAt)
    } else if (c.state === 'walking_away') {
      const dx = c.targetX - c.mesh.position.x;
      const dz = c.targetZ - c.mesh.position.z;
      c.mesh.position.x += (dx > 0 ? 1 : -1) * speed;
      c.mesh.position.z += (dz / (Math.abs(dx) + 1)) * speed * 0.3;
      if (Math.abs(c.mesh.position.x) > 24) {
        scene.remove(c.mesh);
        c.mesh.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); });
        customerNPCs.splice(i, 1);
      }
    }
    // Bob animation
    if (c.mesh.parent) c.mesh.position.y = Math.sin(Date.now() * 0.004 + c.phase) * 0.03;
  }
}

// ─── Particles (visual only — no financial update) ────────────────────────────

function spawnTxVisual(placeId, type) {
  const sm = getPlaceMeshes(placeId); if (!sm) return;
  const sp = sm.group.position;
  const color = { sale:0xf5a623, expense:0xe74c3c, inventory:0x66bb6a }[type] || 0xf5a623;
  for (let i = 0; i < 6; i++) {
    const geo = type === 'inventory' ? new THREE.BoxGeometry(.2,.2,.2) : new THREE.CylinderGeometry(.19,.19,.05,10);
    const mat = new THREE.MeshBasicMaterial({ color, transparent:true, opacity:.9 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(sp.x+(Math.random()-.5)*3, 4.6+Math.random()*.4, sp.z+(Math.random()-.5)*1.6);
    const up = type==='expense' ? -(0.038+Math.random()*.025) : (0.055+Math.random()*.035);
    particles.push({ mesh, vx:(Math.random()-.5)*.045, vy:up, vz:(Math.random()-.5)*.04,
      life:1, decay:.008+Math.random()*.006, spin:(Math.random()-.5)*.12 });
    scene.add(mesh);
  }
  sm.screenMat.color.setHex(color);
  sm.glow.color.setHex(color); sm.glow.intensity = 1.4;
  setTimeout(() => { sm.screenMat.color.setHex(0x2ecc71); sm.glow.intensity = 0; }, 650);
}

function spawnSteam(pos) {
  for (let i = 0; i < 3; i++) {
    const geo = new THREE.SphereGeometry(.1,6,6);
    const mat = new THREE.MeshBasicMaterial({ color:0xff7043, transparent:true, opacity:.7 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(pos.x+(Math.random()-.5)*.38, pos.y+1.5, pos.z+(Math.random()-.5)*.38);
    particles.push({ mesh, vx:(Math.random()-.5)*.02, vy:.05+Math.random()*.03,
      vz:(Math.random()-.5)*.02, life:.65, decay:.02, spin:0 });
    scene.add(mesh);
  }
}

function tickParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.mesh.position.x += p.vx; p.mesh.position.y += p.vy; p.mesh.position.z += p.vz;
    p.mesh.rotation.y += p.spin; p.mesh.rotation.x += p.spin*.5;
    p.vy *= .97;
    p.life -= p.decay; p.mesh.material.opacity = Math.max(0, p.life);
    if (p.life <= 0) {
      scene.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose();
      particles.splice(i, 1);
    }
  }
}

function getOrCreatePersona(name) {
  if (personas.has(name)) return personas.get(name);
  const ci = colorCursor++ % PCOLORS.length;
  const cfg = PERSONA_CFG[name];
  const placeId = cfg ? cfg.place : SHOPS[0].id;
  const placeCfg = findPlace(placeId) || SHOPS[0];
  const role = cfg?.role || 'owner';
  const char = buildChar(name, PCOLORS[ci], PHEX[ci]);
  const [sx,,sz] = placeCfg.pos;
  const entryZ = sz + (sz > 0 ? -1.8 : 1.8);
  char.group.position.set(sx+(Math.random()-.5)*2, 0, entryZ+(Math.random()-.5)*.6);
  char.group.rotation.y = sz > 0 ? 0 : Math.PI;
  char.targetX = char.group.position.x;
  char.targetZ = char.group.position.z;
  scene.add(char.group);
  const sm = getPlaceMeshes(placeId);
  const deskWorldZ = sm ? sz + sm.deskZ : sz + (sz>0?-1.4:1.4);
  char.deskX = sx - .4;
  char.deskZ = deskWorldZ;
  const entry = { ...char, ci, hex:PHEX[ci], placeId, role, data:{} };
  personas.set(name, entry);
  const pData = loadedPersonas.find(p => p.name === name);
  buildPersonaCard(name, entry, pData);
  return entry;
}

function applySSE(data) {
  // Sync global sim time from runner so street clock matches the simulation process
  if (typeof data.sim_minute_of_day === 'number' && typeof data.sim_day_num === 'number') {
    simMinuteOfDay = Math.max(0, Math.min(1439, Math.floor(data.sim_minute_of_day)));
    simDayNum = Math.max(1, Math.floor(data.sim_day_num));
    document.getElementById('simclock').textContent = formatSimTime();
  }
  const name = data.persona_name || 'Agent';
  const p = getOrCreatePersona(name);
  p.data = data;

  // Show phone / email animation when this agent was just interrupted by one
  const variant = data.distraction_variant || '';
  if (variant === 'PHONE_CALL' || variant === 'EMAIL_INQUIRY') {
    const placeId = p.placeId;
    if (placeId) {
      if (!placeIndicators[placeId]) placeIndicators[placeId] = {};
      placeIndicators[placeId][variant === 'PHONE_CALL' ? 'phone' : 'email'] = Date.now();
      ensurePlaceIndicatorMeshes(placeId);
    }
  }

  const ratio = Math.min(1, (data.frustration||0) / (data.patience_budget||50));
  p.ringMat.color.setRGB(ratio*.9+.08, (1-ratio)*.75+.06, .05);
  const onQB = ['click','type','scroll','hover'].includes(data.action_type||'');
  if (onQB && p.state !== 'typing') {
    p.state = 'typing'; p.targetX = p.deskX; p.targetZ = p.deskZ;
    const sm = getPlaceMeshes(p.placeId);
    if (sm) { sm.glow.intensity = .85; sm.glow.color.setHex(0x2ecc71); }
    const placePos = findPlace(p.placeId)?.pos || [0,0,0];
    p.group.rotation.y = placePos[2] > 0 ? 0 : Math.PI;
  } else if (!onQB && p.state === 'typing') {
    p.state = 'idle';
    const sm = getPlaceMeshes(p.placeId);
    if (sm) sm.glow.intensity = 0;
  }
  const thought = (data.thought || '').trim();
  if (thought) {
    if (p.bubMat.map) p.bubMat.map.dispose();
    p.bubMat.map = speechTex(thought.slice(0, 88));
    p.bubMat.map.needsUpdate = true;
    p.bubMat.opacity = 1;
    clearTimeout(p._bubTimer);
    p._bubTimer = setTimeout(() => { p.bubMat.opacity = 0; }, 5500);
  }
  // Log entry (always show thought when present so activity log reflects it)
  const emoji = PERSONA_CFG[name]?.emoji || '👤';
  addLogEntry(emoji, name.replace(/_/g,' '), (thought||data.action_type||'').slice(0,60), p.hex);

  const action = data.action_type || '';
  const goal = (data.goal || '').toLowerCase();
  let tx = null;
  if (action === 'click' || action === 'type') {
    if (goal.includes('sale')||goal.includes('invoice')||goal.includes('revenue')) tx='sale';
    else if (goal.includes('expense')||goal.includes('bill')||goal.includes('pay')) tx='expense';
    else if (goal.includes('inventor')||goal.includes('stock')||goal.includes('product')) tx='inventory';
    else tx = 'sale';
  }
  if (tx) {
    spawnTxVisual(p.placeId, tx);
    addTick(p.placeId, tx, name);
    if (tx === 'sale') fulfillOneCustomerAt(p.placeId); // customer leaves when agent completes sale
  }
  if (ratio > 0.88) spawnSteam(p.group.position);
  refreshPersonaCard(name, p, data);
}

// ─── Popup ────────────────────────────────────────────────────────────────────

const ray  = new THREE.Raycaster();
const mxy  = new THREE.Vector2();
const popEl = document.getElementById('pop');

renderer.domElement.addEventListener('click', e => {
  const rect = wrap.getBoundingClientRect();
  mxy.x = ((e.clientX-rect.left)/rect.width)*2 - 1;
  mxy.y = -((e.clientY-rect.top)/rect.height)*2 + 1;
  ray.setFromCamera(mxy, camera);
  const hits = ray.intersectObjects(scene.children, true);
  let shown = false;
  for (const h of hits) {
    let cur = h.object;
    while (cur) {
      if (cur.userData?.type === 'toggle') {
        handleToggleClick(cur.userData.id);
        return;
      }
      if (cur.userData?.type) { showPop(cur.userData, e); shown=true; break; }
      cur = cur.parent;
    }
    if (shown) break;
  }
  if (!shown) popEl.classList.add('h');
});

function handleToggleClick(placeId) {
  const isActive = placeActive.get(placeId);
  placeActive.set(placeId, !isActive);
  const sm = getPlaceMeshes(placeId);
  if (sm) sm.toggleMat.color.setHex(!isActive ? 0x27ae60 : 0xe74c3c);

  if (!isActive) {
    addLogEntry('🟢', findPlace(placeId)?.name || placeId, 'opened', 'var(--green)');
    // Auto-start timer if not running
    if (!simRunning) toggleSimRunning();
  } else {
    addLogEntry('🔴', findPlace(placeId)?.name || placeId, 'closed', 'var(--red)');
  }
}

function showPop({ type, id, name }, e) {
  const rect = wrap.getBoundingClientRect();
  popEl.style.left = Math.min(e.clientX-rect.left+14, rect.width-300)+'px';
  popEl.style.top  = Math.min(e.clientY-rect.top+14,  rect.height-220)+'px';
  if (type === 'place') {
    const s = findPlace(id); const f = placeFin.get(id)||{};
    document.getElementById('popt').textContent = `${s?.emoji} ${s?.name}`;
    const net = (f.sales||0)-(f.expenses||0);
    const company = getPlaceCompany(id);
    const bal = placeBankBalance.get(id);
    const bankStr = bal != null ? '$'+Number(bal).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '—';
    document.getElementById('popb').innerHTML = `
      ${company ? `<b>Company:</b> ${company}<br>` : ''}
      <b>Status:</b> ${placeActive.get(id) ? '<span style="color:var(--green)">Open</span>' : '<span style="color:var(--red)">Closed</span>'}<br>
      <b>Sales:</b> $${(f.sales||0).toLocaleString()}<br>
      <b>Expenses:</b> $${(f.expenses||0).toLocaleString()}<br>
      <b>Net:</b> <span style="color:${net>=0?'var(--green)':'var(--red)'}">$${net.toLocaleString()}</span><br>
      <b>Transactions:</b> ${f.txCount||0}<br>
      <b>Bank balance:</b> <span style="color:var(--accent)">${bankStr}</span>`;
  } else if (type === 'persona') {
    const p = personas.get(name); const d = p?.data||{};
    const ratio = Math.min(1,(d.frustration||0)/(d.patience_budget||50));
    const pd = loadedPersonas.find(x => x.name===name);
    document.getElementById('popt').textContent = name.replace(/_/g,' ');
    const thought = (d.thought||'').trim().slice(0,120);
    document.getElementById('popb').innerHTML = `
      <b>Role:</b> ${p?.role||'—'} at ${findPlace(p?.placeId)?.name||'—'}<br>
      <b>Goal:</b> ${(d.goal||'—').slice(0,72)}<br>
      ${thought ? `<b>Thought:</b> ${thought}<br>` : ''}
      <b>Mood:</b> ${d.emotional_state||'—'}<br>
      <b>Frustration:</b> ${Math.round(ratio*100)}%<br>
      <b>QB:</b> ${p?.state==='typing'?'<span style="color:var(--green)">Active ✓</span>':'Idle'}<br>
      ${pd?`<b>Tech:</b> ${pd.tech_literacy}/10  <b>Domain:</b> ${pd.domain_literacy}/10`:''}`;
  }
  popEl.classList.remove('h');
}

function drawRelations() {
  if (!relationsData) return;
  // Map throng IDs to places
  const throngToPlace = {};
  for (const t of (relationsData.throngs || [])) {
    if (t.persona_id && PERSONA_CFG[t.persona_id]) {
      throngToPlace[t.id] = PERSONA_CFG[t.persona_id].place;
    }
  }
  const roleColors = {
    accountant: 0x3f88e2, supplier: 0x27ae60, delivery: 0xf5a623,
    vehicle_owner: 0x9b59b6, parking_vendor: 0x607d8b,
  };
  const roleHex = {
    accountant: '#3f88e2', supplier: '#27ae60', delivery: '#f5a623',
    vehicle_owner: '#9b59b6', parking_vendor: '#607d8b',
  };

  for (const rel of (relationsData.relationships || [])) {
    const placeA = throngToPlace[rel.owner_id];
    const placeB = throngToPlace[rel.provider_id];
    if (!placeA || !placeB || placeA === placeB) continue;
    const cfgA = findPlace(placeA);
    const cfgB = findPlace(placeB);
    if (!cfgA || !cfgB) continue;

    const startPos = new THREE.Vector3(cfgA.pos[0], 5.5, cfgA.pos[2]);
    const endPos = new THREE.Vector3(cfgB.pos[0], 5.5, cfgB.pos[2]);
    const midPos = new THREE.Vector3(
      (startPos.x + endPos.x) / 2,
      8 + Math.random() * 1.5,
      (startPos.z + endPos.z) / 2
    );

    const curve = new THREE.QuadraticBezierCurve3(startPos, midPos, endPos);
    const points = curve.getPoints(30);
    const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
    const color = roleColors[rel.role] || 0x9e9e9e;
    const lineMat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.6, linewidth: 2 });
    const line = new THREE.Line(lineGeo, lineMat);
    scene.add(line);

    // Role label at midpoint
    const hex = roleHex[rel.role] || '#9e9e9e';
    const labelTex = signTex(rel.role, hex, '#fff', 200, 40, 14);
    const labelMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(1.4, 0.3),
      new THREE.MeshBasicMaterial({ map: labelTex, transparent: true, depthTest: false })
    );
    labelMesh.position.copy(midPos);
    scene.add(labelMesh);

    relationArcs.push({ line, label: labelMesh });
  }
}

// ─── Launch panel ─────────────────────────────────────────────────────────────

const activeRuns = new Map();
let runPollTimer = null;

function getLaunchParams() {
  return {
    url: document.getElementById('lp-url').value.trim(),
    company: document.getElementById('lp-company').value,
    goal: document.getElementById('lp-goal').value.trim(),
    max_steps: parseInt(document.getElementById('lp-steps').value, 10) || 50,
    max_concurrent: parseInt(document.getElementById('lp-concurrent').value, 10) || 2,
    verbose: document.getElementById('lp-verbose').checked,
    relations: document.getElementById('lp-relations').value.trim() || undefined,
  };
}

function initLaunchPanel() {
  document.getElementById('btn-launch').addEventListener('click', async () => {
    const persona = document.getElementById('lp-persona').value;
    const params = getLaunchParams();
    if (!persona) { alert('Select a persona.'); return; }
    if (!params.url) { alert('Enter a URL.'); return; }
    const btn = document.getElementById('btn-launch');
    btn.disabled = true; btn.textContent = 'Launching…';
    try {
      const res = await fetch('/run', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ persona, ...params }) });
      const data = await res.json();
      if (data.status === 'started') {
        const personasList = getPersonasForRun({ mode: 'single', persona });
        activeRuns.set(data.run_id, { mode: 'single', persona, personas: personasList });
        for (const name of personasList) getOrCreatePersona(name);
        addRunStatusCard(data.run_id, persona, 'single');
        startRunPolling();
        setStatus('live', 'Live');
      } else alert('Failed: ' + (data.message || 'error'));
    } catch (err) { alert('Launch error: ' + err.message); }
    btn.disabled = false; btn.textContent = 'Start Single';
  });

  document.getElementById('btn-swarm').addEventListener('click', async () => {
    const params = getLaunchParams();
    if (!params.url) { alert('Enter a URL.'); return; }
    const btn = document.getElementById('btn-swarm');
    btn.disabled = true; btn.textContent = 'Launching…';
    try {
      const res = await fetch('/run/swarm', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(params) });
      const data = await res.json();
      if (data.status === 'started') {
        const personasList = getPersonasForRun({ mode: 'swarm', persona: 'all' });
        activeRuns.set(data.run_id, { mode: 'swarm', persona: 'all', personas: personasList });
        for (const name of personasList) getOrCreatePersona(name);
        addRunStatusCard(data.run_id, 'All Personas (Swarm)', 'swarm');
        startRunPolling();
        setStatus('live', 'Live — swarm running');
      } else alert('Failed: ' + (data.message || 'error'));
    } catch (err) { alert('Launch error: ' + err.message); }
    btn.disabled = false; btn.textContent = 'Launch All';
  });
}

function addRunStatusCard(runId, label, mode) {
  const container = document.getElementById('runs-list');
  const el = document.createElement('div');
  el.className = 'run-status'; el.id = `rs-${runId}`;
  el.innerHTML = `<div class="run-dot" id="rd-${runId}"></div>
    <div class="run-info"><span>${label.replace(/_/g,' ')}</span><span class="run-elapsed" id="re-${runId}"></span></div>
    <button class="stop-btn" style="padding:.18rem .4rem;border:1px solid var(--red);border-radius:5px;background:transparent;color:var(--red);font-size:.6rem;font-weight:600;cursor:pointer">Stop</button>`;
  el.querySelector('.stop-btn').addEventListener('click', async () => {
    try { await fetch('/run/stop', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ run_id: runId }) }); } catch {}
    markRunDone(runId);
  });
  container.appendChild(el);
}

function markRunDone(runId, runFromServer) {
  const runInfo = activeRuns.get(runId);
  const personsInThisRun = runFromServer
    ? getPersonasForRun(runFromServer)
    : (runInfo?.personas || []);
  const dot = document.getElementById(`rd-${runId}`);
  if (dot) dot.classList.add('done');
  activeRuns.delete(runId);
  for (const name of personsInThisRun) {
    let inOtherRun = false;
    for (const [, info] of activeRuns) {
      if (info.personas && info.personas.includes(name)) { inOtherRun = true; break; }
    }
    if (!inOtherRun) removeAvatar(name);
  }
  const el = document.getElementById(`rs-${runId}`);
  if (el) setTimeout(() => el.remove(), 3000);
  if (activeRuns.size === 0) stopRunPolling();
}

function startRunPolling() {
  stopRunPolling();
  runPollTimer = setInterval(async () => {
    try {
      const res = await fetch('/runs');
      const runs = await res.json();
      for (const [runId] of activeRuns) {
        const active = runs.find(r => r.run_id === runId);
        if (active) {
          const el = document.getElementById(`re-${runId}`);
          if (el) el.textContent = ` · ${Math.round(active.elapsed)}s`;
          if (!active.running) markRunDone(runId, active);
        }
      }
    } catch {}
  }, 2000);
}

function stopRunPolling() {
  if (runPollTimer) { clearInterval(runPollTimer); runPollTimer = null; }
}

// ─── Start Day / Timer ────────────────────────────────────────────────────────

function toggleSimRunning() {
  simRunning = !simRunning;
  const btn = document.getElementById('btn-startday');
  if (simRunning) {
    btn.textContent = '⏸ Pause Day';
    btn.classList.add('paused');
    // Activate all places
    ALL_PLACES.forEach(p => {
      placeActive.set(p.id, true);
      const sm = getPlaceMeshes(p.id);
      if (sm) sm.toggleMat.color.setHex(0x27ae60);
    });
    addLogEntry('▶', 'System', 'Day started', 'var(--accent)');
  } else {
    btn.textContent = '▶ Resume';
    btn.classList.remove('paused');
    addLogEntry('⏸', 'System', 'Day paused', 'var(--yellow)');
  }
}

function initStartDay() {
  document.getElementById('btn-startday').addEventListener('click', toggleSimRunning);
}

function tickTimer(dt) {
  simMinuteOfDay += SIM_SPEED * dt;
  if (simMinuteOfDay >= SIM_END_MINUTE) {
    simDayNum++;
    simMinuteOfDay = SIM_START_MINUTE;
    addLogEntry('🌙', 'System', `Day ${simDayNum-1} ended. New day begins.`, 'var(--muted)');
  }
  document.getElementById('simclock').textContent = formatSimTime();
}

// ─── SSE ──────────────────────────────────────────────────────────────────────

function connectSSE() {
  const es = new EventSource('/stream');
  es.onopen = () => setStatus('live', 'Live — start agents to see activity');
  es.onerror = () => setStatus('off', 'No server');
  es.onmessage = ev => {
    try {
      const d = JSON.parse(ev.data);
      if (d.event !== 'agent_state') return;
      if (!receivedAgentEvent) {
        receivedAgentEvent = true;
        setStatus('live', 'Live');
      }
      eventCount++;
      document.getElementById('ecnt').textContent = `${eventCount} events`;
      applySSE(d);
    } catch (_) {}
  };
}

// ─── Character animation ──────────────────────────────────────────────────────

function animateChars(t) {
  for (const [, p] of personas) {
    p.group.position.x += (p.targetX - p.group.position.x) * .022;
    p.group.position.z += (p.targetZ - p.group.position.z) * .022;
    if (p.state === 'typing') {
      p.group.position.y = Math.sin(t*6 + p.phase) * .028;
      p.body.scale.z = 1 + Math.sin(t*6 + p.phase) * .04;
      const sm = getPlaceMeshes(p.placeId);
      if (sm) sm.glow.intensity = .65 + Math.sin(t*5) * .28;
    } else {
      p.group.position.y = Math.sin(t*1.6 + p.phase) * .055;
      p.body.scale.z = 1;
      p.walkTimer -= .016;
      if (p.walkTimer <= 0) {
        const place = findPlace(p.placeId);
        if (place) {
          const [sx,,sz] = place.pos;
          p.targetX = sx + (Math.random()-.5)*4;
          p.targetZ = sz + (sz>0?-1.7:1.7) + (Math.random()-.5)*1.2;
        }
        p.walkTimer = 3.5 + Math.random()*5;
      }
      const dx = p.targetX - p.group.position.x;
      const dz = p.targetZ - p.group.position.z;
      if (Math.abs(dx)>.06 || Math.abs(dz)>.06) p.group.rotation.y = Math.atan2(dx, dz);
    }
    p.bubble.lookAt(camera.position);
    p.ring.rotation.z = t * 1.8;
  }
}

// ─── Resize + render ──────────────────────────────────────────────────────────

function resize() {
  const W = wrap.clientWidth, H = wrap.clientHeight;
  renderer.setSize(W, H, false);
  camera.aspect = W/H;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

function animate(ts) {
  requestAnimationFrame(animate);
  const t = ts * .001;
  const dt = lastAnimTime ? (t - lastAnimTime) : 0.016;
  lastAnimTime = t;

  controls.update();
  animateChars(t);
  tickPlaceIndicators(t);
  if (simRunning) tickTimer(dt);
  tickCustomers(dt);
  tickParticles();
  // Relation labels face camera
  relationArcs.forEach(a => { if (a.label) a.label.lookAt(camera.position); });
  sun.position.x = Math.cos(t*.04)*22 + 5;
  sun.position.z = Math.sin(t*.04)*14 + 5;
  renderer.render(scene, camera);
}

// ─── Run → persona list (for syncing avatars with running throngs) ─────────────

function getPersonasForRun(run) {
  if (run.mode === 'single' && run.persona) return [run.persona];
  if (run.persona === 'all' && Array.isArray(loadedPersonas)) return loadedPersonas.map(p => p.name);
  return run.persona ? [run.persona] : [];
}

function syncAvatarsFromRuns(runs) {
  if (!Array.isArray(runs)) return;
  for (const run of runs) {
    if (!run.running) continue;
    const names = getPersonasForRun(run);
    for (const name of names) if (name) getOrCreatePersona(name);
  }
}

function removeAvatar(name) {
  const entry = personas.get(name);
  if (!entry) return;
  scene.remove(entry.group);
  personas.delete(name);
  const card = document.getElementById(`pc-${name}`);
  if (card) card.remove();
}

// ─── Refresh config + full place rebuild ─────────────────────────────────────

async function refreshStreetConfig() {
  const btn = document.getElementById('btn-refresh-config');
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    try {
      const cfgRes = await fetch('/street-config');
      if (cfgRes.ok) {
        const cfg = await cfgRes.json();
        PERSONA_CFG = cfg.persona_config || {};
        SHOPS = cfg.places?.shops || [];
        ROOMS = cfg.places?.rooms || [];
        ALL_PLACES = [...SHOPS, ...ROOMS];
        if (Array.isArray(cfg.colors) && cfg.colors.length) PCOLORS = cfg.colors;
        PHEX = PCOLORS.map(c => '#' + Number(c).toString(16).padStart(6, '0'));
        if (typeof cfg.sim_time_scale_factor === 'number' && cfg.sim_time_scale_factor > 0) {
          SIM_SPEED = 1 / cfg.sim_time_scale_factor;
        }
      } else applyStreetConfigFallback();
    } catch (_) {
      applyStreetConfigFallback();
    }

    removePlaceMeshes();
    initPlaceMaps();
    SHOPS.forEach(buildShop);
    ROOMS.forEach(buildRoom);

    const c = document.getElementById('shlist');
    if (c) { c.innerHTML = ''; buildPlaceCards(); }
    await loadBankBalances();

    await loadCredentialsMap();
    updateSigns();

    const personaRes = await fetch('/personas');
    loadedPersonas = (personaRes.ok ? await personaRes.json() : []) || [];
    const sel = document.getElementById('lp-persona');
    if (sel) {
      const currentVal = sel.value;
      sel.innerHTML = '<option value="">— select persona —</option>';
      loadedPersonas.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.name; opt.textContent = p.name.replace(/_/g, ' ');
        sel.appendChild(opt);
      });
      if (currentVal && loadedPersonas.some(p => p.name === currentVal)) sel.value = currentVal;
    }
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '↻ Refresh config'; }
  }
}

// ─── Init (async: street-config → places → running throngs → avatars) ─────────

async function initStreet() {
  try {
    const cfgRes = await fetch('/street-config');
    if (cfgRes.ok) {
      const cfg = await cfgRes.json();
      PERSONA_CFG = cfg.persona_config || {};
      SHOPS = cfg.places?.shops || [];
      ROOMS = cfg.places?.rooms || [];
      ALL_PLACES = [...SHOPS, ...ROOMS];
      if (Array.isArray(cfg.colors) && cfg.colors.length) PCOLORS = cfg.colors;
      PHEX = PCOLORS.map(c => '#' + Number(c).toString(16).padStart(6, '0'));
      if (typeof cfg.sim_time_scale_factor === 'number' && cfg.sim_time_scale_factor > 0) {
        SIM_SPEED = 1 / cfg.sim_time_scale_factor; // real sec per sim min → sim min per real sec
      }
    } else throw new Error('street-config not ok');
  } catch (_) {
    applyStreetConfigFallback();
  }

  initPlaceMaps();
  buildStreet();
  SHOPS.forEach(buildShop);
  ROOMS.forEach(buildRoom);
  buildPlaceCards();
  await loadBankBalances();

  const personaRes = await fetch('/personas');
  loadedPersonas = (personaRes.ok ? await personaRes.json() : []) || [];
  const sel = document.getElementById('lp-persona');
  if (sel) {
    sel.innerHTML = '<option value="">— select persona —</option>';
    loadedPersonas.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name; opt.textContent = p.name.replace(/_/g, ' ');
      sel.appendChild(opt);
    });
  }

  loadCompanies();
  await loadCredentialsMap();
  await loadRelations();

  const runsRes = await fetch('/runs');
  const runs = runsRes.ok ? await runsRes.json() : [];
  syncAvatarsFromRuns(runs);
  for (const run of runs || []) {
    if (run.running && run.run_id) {
      const personasList = getPersonasForRun(run);
      activeRuns.set(run.run_id, { mode: run.mode, persona: run.persona, personas: personasList });
      const label = run.mode === 'swarm' ? 'All Personas (Swarm)' : (run.persona || '').replace(/_/g, ' ');
      addRunStatusCard(run.run_id, label, run.mode || 'single');
    }
  }
  if (activeRuns.size > 0) startRunPolling();

  initLaunchPanel();
  initStartDay();
  initLogToggle();
  const refreshBtn = document.getElementById('btn-refresh-config');
  if (refreshBtn) refreshBtn.addEventListener('click', () => refreshStreetConfig());
  connectSSE();
  animate(0);
}

initStreet();
